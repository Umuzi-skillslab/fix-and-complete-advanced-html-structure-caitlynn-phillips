<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reach out to Caitlynn Phillips Media for inquiries about video production, audio recording, and photography services. We respond within 24 hours.">
    <title>Contact Us | Caitlynn Phillips Media</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="top">
        <h1>Contact Us</h1>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="media.html">Media</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    
    <main>
        <section class="contact-form-section">
            <h2>Get In Touch</h2>
            
            <form action="#" method="post">
                <fieldset>
                    <legend>Personal Information</legend>
                    
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required minlength="2" placeholder="Your Name">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required placeholder="you@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone (Format: 123-456-7890):</label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="555-012-3456">
                    </div>
                </fieldset>
                
                <fieldset>
                    <legend>Project Details</legend>
                    
                    <div class="form-group">
                        <label for="service">Interested Service:</label>
                        <select id="service" name="service" required>
                            <option value="">--Select a Service--</option>
                            <option value="video">Video Production</option>
                            <option value="audio">Audio Recording</option>
                            <option value="photo">Photography</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Budget Range:</label>
                        <div class="radio-options">
                            <input type="radio" id="budget1" name="budget" value="low" required>
                            <label for="budget1">Under $1,000</label>
                            
                            <input type="radio" id="budget2" name="budget" value="med">
                            <label for="budget2">$1,000 - $5,000</label>
                            
                            <input type="radio" id="budget3" name="budget" value="high">
                            <label for="budget3">Over $5,000</label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="guests">Number of Guests (if event):</label>
                        <input type="number" id="guests" name="guests" min="1" max="500">
                    </div>
                    
                    <div class="form-group">
                        <label for="eventDate">Event Date:</label>
                        <input type="date" id="eventDate" name="eventDate">
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" required minlength="10" placeholder="Tell us about your project..."></textarea>
                    </div>
                    
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                        <label for="newsletter">Subscribe to our newsletter</label>
                    </div>
                </fieldset>
                
                <button type="submit">Submit Request</button>
            </form>
        </section>
    </main>
    
    <footer class="bottom">
        <p>Email: contact@mediaproduction.com</p>
    </footer>
</body>
</html>
