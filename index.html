<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Media Production Services - Video, Audio, and Multimedia">
    <title>Media Production</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="top">
        <div class="logo">LOGO</div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="media.html">Media</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    
    <main>
        <!-- Hero Banner -->
        <section class="hero wf-hero">
            <h2>Hero Banner</h2>
            <p>Large Intro Text</p>
            <button class="cta-button">Call to Action Button</button>
        </section>
        
        <!-- Our Services Section -->
        <section class="wf-section">
            <h2 class="section-title"><span>Our Services Section</span></h2>
            <div class="services-grid">
                <article class="service-card">
                    <h3>Service 1</h3>
                    <div class="info-box">Info Box</div>
                    <button class="read-more">Read More</button>
                </article>
                <article class="service-card">
                    <h3>Service 2</h3>
                    <div class="info-box">Info Box</div>
                    <button class="read-more">Read More</button>
                </article>
            </div>
        </section>

        <!-- Featured Media -->
        <section class="wf-section">
            <h2 class="section-title"><span>Featured Media</span></h2>
            <p class="subtitle">Video / Audio / Gallery Grid</p>
            <div class="media-boxes">
                <div class="media-box"><h3>Video</h3></div>
                <div class="media-box"><h3>Audio</h3></div>
                <div class="media-box"><h3>Image</h3></div>
            </div>
            <button class="gallery-btn">Media Gallery Grid</button>
        </section>

        <!-- About Us Section -->
        <section class="wf-section">
            <h2 class="section-title"><span>About Us Section</span></h2>
            <p class="about-text">Brief About Text</p>
        </section>

        <!-- Contact Section -->
        <section class="wf-section">
            <div class="contact-area">
                <div class="contact-form-side">
                    <h3>Contact Form</h3>
                    <form action="#" method="post">
                        <label for="index-name" class="visually-hidden">Name</label>
                        <input type="text" id="index-name" name="name" placeholder="Name" required>
                        <label for="index-email" class="visually-hidden">Email</label>
                        <input type="email" id="index-email" name="email" placeholder="Email" required>
                        <label for="index-subject" class="visually-hidden">Subject</label>
                        <input type="text" id="index-subject" name="subject" placeholder="Subject" required>
                        <label for="index-msg" class="visually-hidden">Message</label>
                        <textarea id="index-msg" name="message" rows="4" placeholder="Message" required></textarea>
                    </form>
                </div>
                <div class="contact-map-side">
                    <figure class="map-placeholder" style="margin: 0; padding: 0;">
                        <img src="images/hero-image.jpg" alt="Map representing the studio location" style="width:100%; height:100%; object-fit:cover; opacity: 0.5;">
                        <figcaption class="visually-hidden">Our Studio Location</figcaption>
                    </figure>
                    <button class="map-btn">Embedded Map</button>
                </div>
            </div>
        </section>
    </main>
    
    <footer class="bottom">
        <p>Quick Links | Social Icons | Copyright Info</p>
    </footer>
</body>
</html>
