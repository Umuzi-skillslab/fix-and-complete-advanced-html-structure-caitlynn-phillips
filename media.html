<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View our media gallery of videos and audio production">
    <title>Media Gallery</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="top">
        <h1>Media Gallery</h1>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="media.html">Media</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    
    <main>
        <section class="video-section">
            <h2>Video Showcase</h2>
            <div class="video-grid">
                <!-- First video - added controls and fallback -->
                <video width="640" height="360" controls>
                    <source src="media/sample1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                
                <!-- Second video -->
                <video width="640" height="360" controls>
                    <source src="media/sample2.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </section>
        
        <section class="audio-section">
            <h2>Audio Sample</h2>
            <p>Listen to our audio production quality.</p>
            <!-- Audio element added -->
            <audio controls>
                <source src="media/sample-audio.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </section>
        
        <section class="location-section">
            <h2>Location</h2>
            <p>Visit our studio at 123 Media Street</p>
            <!-- iframe added -->
            <iframe 
                src="https://www.openstreetmap.org/export/embed.html?bbox=-0.13,51.5,-0.11,51.52&layer=mapnik" 
                width="600" 
                height="450" 
                style="border: 1px solid black" 
                title="Studio Location Form">
            </iframe>
        </section>
        
        <section class="testimonials">
            <h2>Client Testimonials</h2>
            <div class="testimonials-grid">
                <figure>
                    <img src="images/client1.jpg" alt="Client testimonial 1">
                    <figcaption>Client 1 Feedback</figcaption>
                </figure>
                <figure>
                    <img src="images/client2.jpg" alt="Client testimonial 2">
                    <figcaption>Client 2 Feedback</figcaption>
                </figure>
            </div>
        </section>
    </main>
    
    <footer class="bottom">
        <p>Email: contact@mediaproduction.com</p>
    </footer>
</body>
</html>
